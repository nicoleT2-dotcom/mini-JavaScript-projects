<!DOCTYPE html>
<html lang="en">
<head>

  <title>Mini Calender</title>
  <link rel="stylesheet" href="CSS/minCalender.css">
</head>
<body>

  

  <div class="parent-div">
   <div class="granma-div">
  
  <div class="calender">

    <div class="left">
      <p id="date">01</p>
      <p id="day">Sunday</p>


    </div>


    <div class="right">
      <p id="month">January</p>
      <p id="year">2025</p>

    </div>

  </div>


  


      <div class=" container">
  
      <div class="clock">
        <span id="hrs">00</span>
        <span id="">:</span>
        <span id="min">00</span>
        <span id="">:</span>
        <span id="sec">00</span>
    
      

      
      
      </div>

    </div>
  
    </div>
  



  <script src="JavaScript/miniCalender.js"></script>
</body>
</html>
